<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube曲検索＆URL管理ツール Pro</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background-color: #f0f2f5; color: #333; }
        .input-group, .result-box, .fixed-links-box { background: #fff; padding: 25px; border-radius: 16px; border: 1px solid #e1e4e8; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; }
        
        /* 入力エリア */
        .search-form-row { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 15px; }
        .input-item { flex: 1; min-width: 250px; }
        label { font-weight: bold; font-size: 0.95em; color: #555; display: block; margin-bottom: 8px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ccd0d5; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        .search-btn { background: #ff0000; color: white; border: none; font-weight: bold; width: 100%; padding: 15px; font-size: 1.1em; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .search-btn:hover { background: #cc0000; }

        /* 検索結果エリア（3本横並び） */
        #results-container { display: none; margin-bottom: 25px; }
        h3 { border-bottom: 2px solid #ff0000; padding-bottom: 10px; margin-bottom: 20px; }
        .video-list { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .video-item { background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; width: calc(33.333% - 14px); min-width: 280px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; transition: transform 0.2s; }
        .video-item:hover { transform: translateY(-5px); }
        .thumb-wrapper { width: 100%; position: relative; padding-top: 56.25%; /* 16:9 aspect ratio */ overflow: hidden; }
        .thumb-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .video-meta { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .video-title { font-size: 0.95em; font-weight: bold; color: #1a1a1a; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em; line-height: 1.4em; }
        .channel-title { font-size: 0.85em; color: #606770; margin-bottom: 15px; }
        .select-btn { background: #f0f2f5; color: #1c1e21; border: 1px solid #ccd0d5; font-weight: bold; width: 100%; padding: 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .select-btn:hover { background: #e4e6eb; }
        .video-item.selected { border: 2px solid #007bff; box-shadow: 0 0 10px rgba(0,123,255,0.2); }
        .video-item.selected .select-btn { background: #007bff; color: white; border-color: #007bff; }

        /* URLコピーエリア */
        .final-url-box { display: none; }
        .url-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; background: #fafbfc; padding: 15px; border-radius: 8px; border: 1px solid #e1e4e8; }
        #url-yt { flex-grow: 1; padding: 10px; border: 1px solid #ccd0d5; border-radius: 6px; background: #fff; font-family: monospace; font-size: 0.9em; }
        .copy-btn { background: #28a745; color: white; border: none; font-weight: bold; padding: 10px 20px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .copy-btn:hover { background: #218838; }

        /* 固定リンクエリア */
        .fixed-links-list { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 15px; }
        .fixed-link-item { display: flex; align-items: center; gap: 10px; text-decoration: none; padding: 10px 15px; background: #fafbfc; border: 1px solid #e1e4e8; border-radius: 8px; transition: background 0.2s; }
        .fixed-link-item:hover { background: #f0f2f5; }
        .link-icon { font-size: 1.5em; }
        .link-text-wrapper { display: flex; flex-direction: column; }
        .link-name { font-weight: bold; font-size: 1.1em; }
        .link-desc { font-size: 0.8em; color: #606770; }
        .download-text { color: #28a745; }
        .convert-text { color: #6f42c1; }

        hr { border: 0; border-top: 1px solid #e1e4e8; margin: 30px 0; }
    </style>
</head>
<body>

    <h2>YouTube曲検索ツール Pro</h2>
    
    <div class="input-group">
        <div class="search-form-row">
            <div class="input-item">
                <label for="song">曲名:</label>
                <input type="text" id="song" placeholder="例：夜に駆ける">
            </div>
            <div class="input-item">
                <label for="artist">作曲者・歌手（任意）:</label>
                <input type="text" id="artist" placeholder="例：Ayase">
            </div>
        </div>
        <button class="search-btn" onclick="searchYoutube()">YouTubeで上3本を検索</button>
    </div>

    <div id="results-container" class="result-box">
        <h3>検索結果 (上位3本)</h3>
        <p style="font-size: 0.9em; color: #606770; margin-bottom: 20px;">ほしい動画の「この動画を選択」ボタンを押してください。</p>
        <div id="video-list" class="video-list">
            </div>
    </div>

    <div id="final-url-container" class="result-box final-url-box">
        <label>選択した動画のURL:</label>
        <div class="url-row">
            <input type="text" id="url-yt" readonly placeholder="動画を選択するとここにURLが出ます">
            <button class="copy-btn" onclick="copyUrl()">URLをコピー</button>
        </div>
    </div>

    <hr>

    <div class="fixed-links-box">
        <label>作業用固定リンク:</label>
        <div class="fixed-links-list">
            <a href="https://yt2mp3.sc/" target="_blank" class="fixed-link-item download-text">
                <span class="link-icon">💾</span>
                <div class="link-text-wrapper">
                    <span class="link-name">Download</span>
                    <span class="link-desc">いつものDLサイトを開く</span>
                </div>
            </a>
            <a href="https://online-audio-converter.com/ja/" target="_blank" class="fixed-link-item convert-text">
                <span class="link-icon">🔄</span>
                <div class="link-text-wrapper">
                    <span class="link-name">mp3 to wav</span>
                    <span class="link-desc">いつもの変換サイトを開く</span>
                </div>
            </a>
        </div>
    </div>

    <script>
        // ★ここに自分のAPIキーを貼り付けてください
        const API_KEY = 'AIzaSyC1I3ALsbffg085r2w8nWYGVruHopTBEug'; 

        // 選択された動画のURLを保持する変数
        let selectedVideoUrl = "";

        async function searchYoutube() {
            const song = document.getElementById('song').value;
            const artist = document.getElementById('artist').value;

            if (!song) {
                alert('曲名を入力してください！');
                return;
            }

            // 検索・コピーエリアをリセット
            document.getElementById('results-container').style.display = 'none';
            document.getElementById('final-url-container').style.display = 'none';
            document.getElementById('url-yt').value = "";
            selectedVideoUrl = "";

            const searchQuery = artist ? `${song} ${artist}` : song;
            // maxResults=3 に変更して上3本を取得
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&key=${API_KEY}&type=video&maxResults=3`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    alert(`Google APIエラー: ${data.error.message}\n(APIキーや制限を確認してください)`);
                    return;
                }

                if (data.items && data.items.length > 0) {
                    displayResults(data.items);
                } else {
                    alert('動画が見つかりませんでした。別のキーワードで試してください。');
                }
            } catch (error) {
                alert('通信エラーが発生しました。');
                console.error(error);
            }
        }

        // 3本の検索結果を画面に表示する関数
        function displayResults(videos) {
            const listContainer = document.getElementById('video-list');
            listContainer.innerHTML = ''; // リストを空にする

            videos.forEach((video, index) => {
                const videoId = video.id.videoId;
                const videoUrl = `https://www.youtube.com/watch?v=${videoId}`;
                const title = video.snippet.title;
                const channelTitle = video.snippet.channelTitle;
                
                // ★解像度を最高にするロジック
                // maxres が無い場合は high を使用する
                const thumbs = video.snippet.thumbnails;
                const thumbnailUrl = (thumbs.maxres ? thumbs.maxres.url : thumbs.high.url);

                // 動画項目のHTMLを作成
                const videoItem = document.createElement('div');
                videoItem.className = 'video-item';
                videoItem.id = `video-${index}`;
                videoItem.innerHTML = `
                    <div class="thumb-wrapper">
                        <img src="${thumbnailUrl}" alt="${title}">
                    </div>
                    <div class="video-meta">
                        <div>
                            <div class="video-title" title="${title}">${title}</div>
                            <div class="channel-title">${channelTitle}http://googleusercontent.com/image_generation_content/0
