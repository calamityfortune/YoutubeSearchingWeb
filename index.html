<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube曲検索＆URL管理ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f9f9f9; }
        .input-group, .result-box { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #video-info { display: none; text-align: center; margin-bottom: 20px; }
        #thumbnail { width: 100%; max-width: 320px; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; }
        .url-row { display: flex; align-items: center; margin-top: 10px; gap: 8px; flex-wrap: wrap; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex-grow: 1; min-width: 200px; }
        
        /* ボタンのデザイン */
        button { cursor: pointer; padding: 10px 15px; border-radius: 6px; border: 1px solid #999; background: #eee; transition: 0.2s; }
        button:hover { background: #ddd; }
        .search-btn { background: #ff0000; color: white; border: none; font-weight: bold; width: 100%; padding: 12px; font-size: 1.1em; margin-top: 10px; }
        .search-btn:hover { background: #cc0000; }
        
        /* リンクボタンのデザイン */
        .link-btn { background: #007bff; color: white; border: none; text-decoration: none; font-size: 0.9em; padding: 10px 15px; border-radius: 6px; text-align: center; display: none; }
        .link-btn:hover { background: #0056b3; }
        
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        label { font-weight: bold; font-size: 0.9em; color: #444; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">YouTube曲検索ツール</h2>
    
    <div class="input-group">
        <label>曲名:</label><br>
        <input type="text" id="song" placeholder="例：Altale">
        <div style="margin-top:10px;">
            <label>作曲者（任意）:</label><br>
            <input type="text" id="artist" placeholder="例：Sakuzyo">
        </div>
        <button class="search-btn" onclick="searchYoutube()">YouTubeで検索</button>
    </div>

    <div class="result-box">
        <div id="video-info">
            <strong id="video-title"></strong><br>
            <img id="thumbnail" src="" alt="サムネイル">
        </div>

        <label>YouTube URL:</label>
        <div class="url-row">
            <input type="text" id="url-yt" readonly placeholder="検索するとここにURLが出ます">
            <button onclick="copyUrl('url-yt')">コピー</button>
            <a id="link-yt" class="link-btn" href="#" target="_blank">サイトへ飛ぶ</a>
        </div>

        <hr>

        <label>追加URL 1:</label>
        <div class="url-row">
            <input type="text" id="url-extra1" placeholder="https://..." oninput="updateLink(1)">
            <button onclick="copyUrl('url-extra1')">コピー</button>
            <a id="link-extra1" class="link-btn" href="#" target="_blank">開く</a>
        </div>

        <p></p>

        <label>追加URL 2:</label>
        <div class="url-row">
            <input type="text" id="url-extra2" placeholder="https://..." oninput="updateLink(2)">
            <button onclick="copyUrl('url-extra2')">コピー</button>
            <a id="link-extra2" class="link-btn" href="#" target="_blank">開く</a>
        </div>
    </div>

    <script>
        // ★ここに自分のAPIキーを貼り付けてください
        const API_KEY = 'AIzaSyDTOKFF3kaFLDYqwFlvbpqHev7AyCh-AsY'; 

        async function searchYoutube() {
            const song = document.getElementById('song').value;
            const artist = document.getElementById('artist').value;

            if (!song) {
                alert('曲名を入力してください！');
                return;
            }

            const searchQuery = artist ? `${song} ${artist}` : song;
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&key=${API_KEY}&type=video&maxResults=1`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const video = data.items[0];
                    const videoId = video.id.videoId;
                    const videoUrl = `https://www.youtube.com/watch?v=${videoId}`;

                    // タイトルとサムネイルをセット
                    document.getElementById('video-title').innerText = video.snippet.title;
                    document.getElementById('thumbnail').src = video.snippet.thumbnails.medium.url;
                    
                    // URLとリンクボタンをセット
                    document.getElementById('url-yt').value = videoUrl;
                    const ytBtn = document.getElementById('link-yt');
                    ytBtn.href = videoUrl;
                    ytBtn.style.display = 'inline-block';

                    document.getElementById('video-info').style.display = 'block';
                } else {
                    alert('動画が見つかりませんでした。');
                }
            } catch (error) {
                alert('検索に失敗しました。APIの設定を確認してください。');
            }
        }

        // 入力されたURLに応じてリンクボタンを表示・更新する
        function updateLink(num) {
            const inputVal = document.getElementById(`url-extra${num}`).value;
            const linkBtn = document.getElementById(`link-extra${num}`);
            
            if (inputVal.startsWith('http')) {
                linkBtn.href = inputVal;
                linkBtn.style.display = 'inline-block';
            } else {
                linkBtn.style.display = 'none';
            }
        }

        function copyUrl(id) {
            const target = document.getElementById(id);
            if (!target.value) {
                alert('コピーする内容がありません！');
                return;
            }
            target.select();
            document.execCommand('copy');
            alert('コピーしました！');
        }
    </script>

</body>
</html>
