<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube曲検索＆URL管理ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f9f9f9; }
        .input-group, .result-box { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #video-info { display: none; text-align: center; margin-bottom: 20px; }
        #thumbnail { width: 100%; max-width: 320px; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; }
        .url-row { display: flex; align-items: center; margin-top: 10px; gap: 8px; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex-grow: 1; }
        
        button { cursor: pointer; padding: 10px 15px; border-radius: 6px; border: 1px solid #999; background: #eee; }
        .search-btn { background: #ff0000; color: white; border: none; font-weight: bold; width: 100%; padding: 12px; font-size: 1.1em; margin-top: 10px; border-radius: 6px; }
        
        /* リンクボタンを大きく押しやすく */
        .link-btn { 
            background: #007bff; color: white; border: none; text-decoration: none; 
            font-size: 0.95em; padding: 10px 20px; border-radius: 6px; text-align: center; 
            display: none; font-weight: bold; min-width: 120px;
        }
        .link-btn:hover { opacity: 0.8; }
        .download-btn { background: #28a745; } /* 緑 */
        .convert-btn { background: #6f42c1; }  /* 紫 */

        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        label { font-weight: bold; font-size: 0.9em; color: #444; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">YouTube曲検索ツール</h2>
    
    <div class="input-group">
        <label>曲名:</label><br>
        <input type="text" id="song" placeholder="例：夜に駆ける">
        <div style="margin-top:10px;">
            <label>作曲者（任意）:</label><br>
            <input type="text" id="artist" placeholder="例：Ayase">
        </div>
        <button class="search-btn" onclick="searchYoutube()">YouTubeで検索</button>
    </div>

    <div class="result-box">
        <div id="video-info">
            <strong id="video-title"></strong><br>
            <img id="thumbnail" src="" alt="サムネイル">
        </div>

        <label>YouTube URL:</label>
        <div class="url-row">
            <input type="text" id="url-yt" readonly placeholder="検索するとURLが出ます">
            <button onclick="copyUrl('url-yt')">コピー</button>
            <a id="link-yt" class="link-btn" href="#" target="_blank">YouTubeを開く</a>
        </div>

        <hr>

        <label>Download:</label>
        <div class="url-row">
            <input type="text" id="url-extra1" placeholder="https://yt2mp3.sc" oninput="updateLink(1)">
            <a id="link-extra1" class="link-btn download-btn" href="#" target="_blank">Download</a>
        </div>

        <p></p>

        <label>mp3 to wav:</label>
        <div class="url-row">
            <input type="text" id="url-extra2" placeholder="https://online-audio-converter.com/ja/" oninput="updateLink(2)">
            <a id="link-extra2" class="link-btn convert-btn" href="#" target="_blank">mp3 to wav</a>
        </div>
    </div>

    <script>
        // ★ここに最新のAPIキーを貼り付けてください
        const API_KEY = 'YOUR_API_KEY_HERE'; 

        async function searchYoutube() {
            const song = document.getElementById('song').value;
            const artist = document.getElementById('artist').value;
            if (!song) return alert('曲名を入れてね！');

            const searchQuery = artist ? `${song} ${artist}` : song;
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&key=${API_KEY}&type=video&maxResults=1`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    alert(`Googleエラー: ${data.error.message}`);
                    return;
                }

                if (data.items && data.items.length > 0) {
                    const video = data.items[0];
                    const vUrl = `https://www.youtube.com/watch?v=${video.id.videoId}`;
                    document.getElementById('video-title').innerText = video.snippet.title;
                    document.getElementById('thumbnail').src = video.snippet.thumbnails.medium.url;
                    document.getElementById('url-yt').value = vUrl;
                    const btn = document.getElementById('link-yt');
                    btn.href = vUrl; btn.style.display = 'inline-block';
                    document.getElementById('video-info').style.display = 'block';
                } else {
                    alert('動画が見つかりませんでした。');
                }
            } catch (e) {
                alert('通信エラーが発生しました。');
            }
        }

        function updateLink(num) {
            const val = document.getElementById(`url-extra${num}`).value;
            const btn = document.getElementById(`link-extra${num}`);
            if (val.startsWith('http')) {
                btn.href = val; btn.style.display = 'inline-block';
            } else {
                btn.style.display = 'none';
            }
        }

        function copyUrl(id) {
            const target = document.getElementById(id);
            if (!target.value) return;
            target.select();
            document.execCommand('copy');
            alert('URLをコピーしたよ！');
        }
    </script>
</body>
</html>
