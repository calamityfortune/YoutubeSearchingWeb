<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube曲検索ツール Pro</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 900px; margin: 0 auto; background-color: #f0f2f5; }
        .input-group, .result-box { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 20px; }
        
        /* 3本並べるための設定 */
        .video-list { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .video-item { width: calc(33.333% - 10px); min-width: 260px; background: #fff; border: 1px solid #eee; border-radius: 8px; overflow: hidden; text-align: center; padding-bottom: 10px; }
        
        /* 最高画質サムネイルを綺麗に見せる */
        .thumb-wrapper { width: 100%; aspect-ratio: 16 / 9; overflow: hidden; background: #000; }
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .video-title { font-size: 0.9em; font-weight: bold; padding: 10px; height: 3em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .search-btn { background: #ff0000; color: white; border: none; font-weight: bold; width: 100%; padding: 15px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        .select-btn { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .url-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; background: #f8f9fa; padding: 10px; border-radius: 5px; }
        #url-yt { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        
        .fixed-link { text-decoration: none; font-weight: bold; margin-right: 20px; font-size: 1.1em; }
        .download { color: #28a745; }
        .convert { color: #6f42c1; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">YouTube曲検索ツール Pro</h2>
    
    <div class="input-group">
        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;"><label>曲名:</label><br><input type="text" id="song" style="width:100%;"></div>
            <div style="flex: 1;"><label>作曲者:</label><br><input type="text" id="artist" style="width:100%;"></div>
        </div>
        <button class="search-btn" onclick="searchYoutube()">YouTubeで3本検索</button>
    </div>

    <div id="results-area" class="result-box" style="display:none;">
        <label>検索結果 (上位3本):</label>
        <div id="video-list" class="video-list"></div>
        
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
        
        <label>選択した動画のURL:</label>
        <div class="url-row">
            <input type="text" id="url-yt" readonly>
            <button onclick="copyUrl()" style="padding: 8px 15px; cursor:pointer;">コピー</button>
        </div>
    </div>

    <div class="result-box">
        <label>作業リンク:</label><br><br>
        <a href="https://yt2mp3.sc/" target="_blank" class="fixed-link download">Download</a>
        <a href="https://online-audio-converter.com/ja/" target="_blank" class="fixed-link convert">mp3 to wav</a>
    </div>

    <script>
        // ★ここに最新の「制限なし」APIキーを貼り付け！
        const API_KEY = 'AIzaSyC1I3ALsbffg085r2w8nWYGVruHopTBEug'; 

        async function searchYoutube() {
            const song = document.getElementById('song').value;
            const artist = document.getElementById('artist').value;
            if (!song) return alert('曲名を入れてね');

            const query = artist ? `${song} ${artist}` : song;
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&key=${API_KEY}&type=video&maxResults=3`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.error) {
                    alert('Googleエラー: ' + data.error.message);
                    return;
                }

                const list = document.getElementById('video-list');
                list.innerHTML = '';
                
                if (data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const id = item.id.videoId;
                        const title = item.snippet.title;
                        // 最高画質を狙う
                        const thumb = item.snippet.thumbnails.high.url; 
                        
                        const div = document.createElement('div');
                        div.className = 'video-item';
                        div.innerHTML = `
                            <div class="thumb-wrapper"><img src="${thumb}"></div>
                            <div class="video-title">${title}</div>
                            <button class="select-btn" onclick="selectVideo('${id}')">この動画を選択</button>
                        `;
                        list.appendChild(div);
                    });
                    document.getElementById('results-area').style.display = 'block';
                } else {
                    alert('動画が見つかりませんでした');
                }
            } catch (e) {
                alert('エラーが発生しました');
            }
        }

        function selectVideo(id) {
            document.getElementById('url-yt').value = `https://www.youtube.com/watch?v=${id}`;
        }

        function copyUrl() {
            const t = document.getElementById('url-yt');
            if(!t.value) return;
            t.select();
            document.execCommand('copy');
            alert('URLをコピーしました！');
        }
    </script>
</body>
</html>
