<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube曲検索＆URL管理ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f9f9f9; }
        .input-group, .result-box { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #video-info { display: none; text-align: center; margin-bottom: 20px; }
        #thumbnail { width: 100%; max-width: 320px; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; }
        .url-row { display: flex; align-items: center; margin-top: 10px; gap: 8px; flex-wrap: wrap; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex-grow: 1; }
        button { cursor: pointer; padding: 10px 15px; border-radius: 6px; border: 1px solid #999; background: #eee; }
        .search-btn { background: #ff0000; color: white; border: none; font-weight: bold; width: 100%; padding: 12px; margin-top: 10px; }
        .link-btn { background: #007bff; color: white; border: none; text-decoration: none; padding: 10px 15px; border-radius: 6px; display: none; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">YouTube曲検索ツール</h2>
    
    <div class="input-group">
        <label>曲名:</label><br>
        <input type="text" id="song" placeholder="例：夜に駆ける">
        <div style="margin-top:10px;">
            <label>作曲者（任意）:</label><br>
            <input type="text" id="artist" placeholder="例：Ayase">
        </div>
        <button class="search-btn" onclick="searchYoutube()">YouTubeで検索</button>
    </div>

    <div class="result-box">
        <div id="video-info">
            <strong id="video-title"></strong><br>
            <img id="thumbnail" src="" alt="サムネイル">
        </div>

        <label>YouTube URL:</label>
        <div class="url-row">
            <input type="text" id="url-yt" readonly>
            <button onclick="copyUrl('url-yt')">コピー</button>
            <a id="link-yt" class="link-btn" href="#" target="_blank">サイトへ飛ぶ</a>
        </div>

        <hr>
        <label>追加URL 1:</label>
        <div class="url-row">
            <input type="text" id="url-extra1" oninput="updateLink(1)">
            <button onclick="copyUrl('url-extra1')">コピー</button>
            <a id="link-extra1" class="link-btn" href="#" target="_blank">開く</a>
        </div>
        <p></p>
        <label>追加URL 2:</label>
        <div class="url-row">
            <input type="text" id="url-extra2" oninput="updateLink(2)">
            <button onclick="copyUrl('url-extra2')">コピー</button>
            <a id="link-extra2" class="link-btn" href="#" target="_blank">開く</a>
        </div>
    </div>

    <script>
        // ★ここを最新のキーに必ず書き換えてください
        const API_KEY = 'AIzaSyC1I3ALsbffg085r2w8nWYGVruHopTBEug'; 

        async function searchYoutube() {
            const song = document.getElementById('song').value;
            const artist = document.getElementById('artist').value;
            if (!song) return alert('曲名を入れてね');

            const searchQuery = artist ? `${song} ${artist}` : song;
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&key=${API_KEY}&type=video&maxResults=1`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    // 具体的なエラー内容をアラートで出す
                    alert(`Googleエラー: ${data.error.message}\n理由: ${data.error.errors[0].reason}`);
                    return;
                }

                if (data.items && data.items.length > 0) {
                    const video = data.items[0];
                    const vUrl = `https://www.youtube.com/watch?v=${video.id.videoId}`;
                    document.getElementById('video-title').innerText = video.snippet.title;
                    document.getElementById('thumbnail').src = video.snippet.thumbnails.medium.url;
                    document.getElementById('url-yt').value = vUrl;
                    const btn = document.getElementById('link-yt');
                    btn.href = vUrl;
                    btn.style.display = 'inline-block';
                    document.getElementById('video-info').style.display = 'block';
                } else {
                    alert('動画が見つかりませんでした。入力内容を変えてみてください。');
                }
            } catch (e) {
                alert('通信に失敗しました。');
            }
        }

        function updateLink(n) {
            const val = document.getElementById(`url-extra${n}`).value;
            const btn = document.getElementById(`link-extra${n}`);
            if (val.startsWith('http')) {
                btn.href = val; btn.style.display = 'inline-block';
            } else {
                btn.style.display = 'none';
            }
        }

        function copyUrl(id) {
            const t = document.getElementById(id);
            if (!t.value) return;
            t.select();
            document.execCommand('copy');
            alert('コピーしました！');
        }
    </script>
</body>
</html>
