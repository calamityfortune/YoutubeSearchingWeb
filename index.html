<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マルチURLツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .input-group { margin-bottom: 15px; }
        .result-box { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .url-row { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; }
        input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .url-input { width: 350px; }
        button { cursor: pointer; padding: 8px 15px; }
    </style>
</head>
<body>

    <h2>曲検索＆URL管理ツール</h2>
    
    <div class="input-group">
        <input type="text" id="song" placeholder="曲名を入力">
        <input type="text" id="artist" placeholder="作曲者を入力">
        <button onclick="searchYoutube()" style="background: #ff0000; color: white; border: none;">YouTube検索</button>
    </div>

    <div class="result-box">
        <p><strong>YouTube動画:</strong> <span id="video-title">（未検索）</span></p>
        <div class="url-row">
            <input type="text" id="url-yt" class="url-input" readonly placeholder="YouTube URL">
            <button onclick="copyUrl('url-yt')">コピー</button>
        </div>

        <p><strong>追加URL 1:</strong></p>
        <div class="url-row">
            <input type="text" id="url-extra1" class="url-input" placeholder="https://online-audio-converter.com/ja/">
            <button onclick="copyUrl('url-extra1')">コピー</button>
        </div>

        <p><strong>追加URL 2:</strong></p>
        <div class="url-row">
            <input type="text" id="url-extra2" class="url-input" placeholder="https://yt2mp3.sc">
            <button onclick="copyUrl('url-extra2')">コピー</button>
        </div>
    </div>

    <script>
        // ★ここにあなたのAPIキーを貼り付けてください
        const API_KEY = 'AIzaSyDTOKFF3kaFLDYqwFlvbpqHev7AyCh-AsY'; 

        async function searchYoutube() {
            const song = document.getElementById('song').value;
            const artist = document.getElementById('artist').value;
            if (!song) return alert('曲名を入れてね');

            const query = encodeURIComponent(`${song} ${artist}`);
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${query}&key=${API_KEY}&type=video&maxResults=1`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.items && data.items.length > 0) {
                    document.getElementById('video-title').innerText = data.items[0].snippet.title;
                    document.getElementById('url-yt').value = `https://www.youtube.com/watch?v=${data.items[0].id.videoId}`;
                } else {
                    alert('見つかりませんでした');
                }
            } catch (e) {
                alert('エラーが発生しました');
            }
        }

        // 指定されたIDの入力をコピーする共通命令
        function copyUrl(id) {
            const target = document.getElementById(id);
            if (!target.value) return alert('中身が空だよ！');
            target.select();
            document.execCommand('copy');
            alert('コピーしました！');
        }
    </script>

</body>
</html>
