<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube曲検索ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f9f9f9; }
        .input-group { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; }
        .result-box { background: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; border: 1px solid #ddd; }
        #video-info { display: none; text-align: center; margin-bottom: 20px; }
        #thumbnail { width: 100%; max-width: 320px; border-radius: 8px; margin-top: 10px; }
        .url-row { display: flex; align-items: center; margin-top: 10px; gap: 10px; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex-grow: 1; }
        .search-btn { background: #ff0000; color: white; border: none; font-weight: bold; width: 100%; padding: 12px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">YouTube曲検索ツール</h2>
    
    <div class="input-group">
        <label>曲名:</label><br>
        <input type="text" id="song" placeholder="例：夜に駆ける">
        <div style="margin-top:10px;">
            <label>作曲者（任意）:</label><br>
            <input type="text" id="artist" placeholder="例：Ayase">
        </div>
        <button class="search-btn" onclick="searchYoutube()">YouTubeで検索</button>
    </div>

    <div class="result-box">
        <div id="video-info">
            <strong id="video-title"></strong><br>
            <img id="thumbnail" src="" alt="サムネイル">
        </div>
        <div class="url-row">
            <input type="text" id="url-output" readonly placeholder="ここにURLが表示されます">
            <button onclick="copyUrl()">コピー</button>
        </div>
    </div>

    <script>
        // ★ここに自分のAPIキーを貼り付けてください
        const API_KEY = 'AIzaSyDTOKFF3kaFLDYqwFlvbpqHev7AyCh-AsY'; 

        async function searchYoutube() {
            const song = document.getElementById('song').value;
            const artist = document.getElementById('artist').value;

            if (!song) {
                alert('曲名を入力してください！');
                return;
            }

            const searchQuery = artist ? `${song} ${artist}` : song;
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&key=${API_KEY}&type=video&maxResults=1`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const video = data.items[0];
                    document.getElementById('video-title').innerText = video.snippet.title;
                    document.getElementById('thumbnail').src = video.snippet.thumbnails.medium.url;
                    document.getElementById('url-output').value = `https://www.youtube.com/watch?v=${video.id.videoId}`;
                    document.getElementById('video-info').style.display = 'block';
                } else {
                    alert('動画が見つかりませんでした。');
                }
            } catch (error) {
                console.error(error);
                alert('検索に失敗しました。APIキーの設定を確認してください。');
            }
        }

        function copyUrl() {
            const copyTarget = document.getElementById('url-output');
            copyTarget.select();
            document.execCommand('copy');
            alert('URLをコピーしました！');
        }
    </script>
</body>
</html>
