<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>YouTube曲検索＆URL管理ツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; background-color: #f9f9f9; }
        .input-group, .result-box { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
        #video-info { display: none; text-align: center; margin-bottom: 20px; }
        
        /* サムネイルを大きく綺麗に表示 */
        #thumbnail { width: 100%; max-width: 480px; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; }
        
        .url-row { display: flex; align-items: center; margin-top: 10px; gap: 8px; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 6px; flex-grow: 1; }
        
        .search-btn { background: #ff0000; color: white; border: none; font-weight: bold; width: 100%; padding: 12px; font-size: 1.1em; margin-top: 10px; border-radius: 6px; cursor: pointer; }
        
        /* ハイパーリンクのデザイン */
        .fixed-link { text-decoration: none; font-weight: bold; font-size: 1.2em; transition: 0.2s; }
        .fixed-link:hover { opacity: 0.7; }
        .download-text { color: #28a745; }
        .convert-text { color: #6f42c1; }

        .copy-btn { cursor: pointer; padding: 10px 15px; border-radius: 6px; border: 1px solid #999; background: #eee; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        label { font-weight: bold; font-size: 0.9em; color: #444; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">YouTube曲検索ツール</h2>
    
    <div class="input-group">
        <label>曲名:</label><br>
        <input type="text" id="song" placeholder="例：夜に駆ける">
        <div style="margin-top:10px;">
            <label>作曲者（任意）:</label><br>
            <input type="text" id="artist" placeholder="例：Ayase">
        </div>
        <button class="search-btn" onclick="searchYoutube()">YouTubeで検索</button>
    </div>

    <div class="result-box">
        <div id="video-info">
            <strong id="video-title" style="font-size: 1.1em; display: block; margin-bottom: 5px;"></strong>
            <img id="thumbnail" src="" alt="サムネイル">
        </div>

        <label>YouTube URL:</label>
        <div class="url-row">
            <input type="text" id="url-yt" readonly>
            <button class="copy-btn" onclick="copyUrl('url-yt')">コピー</button>
        </div>

        <hr>

        <div style="margin-bottom: 15px;">
            <label>Download サイト:</label><br>
            <a href="https://yt2mp3.sc/" target="_blank" class="fixed-link download-text">Download</a>
        </div>

        <div>
            <label>mp3 to wav サイト:</label><br>
            <a href="https://online-audio-converter.com/ja/" target="_blank" class="fixed-link convert-text">mp3 to wav</a>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyC1I3ALsbffg085r2w8nWYGVruHopTBEug'; // 最新のキーに書き換えてください

        async function searchYoutube() {
            const song = document.getElementById('song').value;
            const artist = document.getElementById('artist').value;
            if (!song) return alert('曲名を入れてね！');

            const searchQuery = artist ? `${song} ${artist}` : song;
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(searchQuery)}&key=${API_KEY}&type=video&maxResults=1`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const video = data.items[0];
                    const vUrl = `https://www.youtube.com/watch?v=${video.id.videoId}`;
                    
                    document.getElementById('video-title').innerText = video.snippet.title;
                    
                    // ★画質を「high」または「maxres」に設定
                    // maxres が無い動画もあるため、まずは high を指定
                    const thumbs = video.snippet.thumbnails;
                    document.getElementById('thumbnail').src = (thumbs.maxres ? thumbs.maxres.url : thumbs.high.url);
                    
                    document.getElementById('url-yt').value = vUrl;
                    document.getElementById('video-info').style.display = 'block';
                } else {
                    alert('動画が見つかりませんでした。');
                }
            } catch (e) {
                alert('通信エラーが発生しました。');
            }
        }

        function copyUrl(id) {
            const target = document.getElementById(id);
            if (!target.value) return;
            target.select();
            document.execCommand('copy');
            alert('コピーしました！');
        }
    </script>
</body>
</html>
